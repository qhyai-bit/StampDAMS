server:
  port: 8080

spring:
  application:
    name: stamp-backend
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 210MB
  datasource:
    url: jdbc:mysql://localhost:3306/stamp_dams?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # 如果 Redis 没有密码，这里保持为空即可
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-cookie: false
  is-read-header: true
  header-name: Authorization

springdoc:
  api-docs:
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn

# 邮票图片本地存储根目录（相对运行目录，也可用绝对路径）
stamp:
  upload:
    root-path: E:/Images
    public-url-prefix: /files


