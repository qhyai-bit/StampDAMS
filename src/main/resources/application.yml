server:
  port: 8080

spring:
  application:
    name: stamp-backend
  datasource:
    url: jdbc:mysql://localhost:3306/stamp_dams?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid

springdoc:
  api-docs:
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn

